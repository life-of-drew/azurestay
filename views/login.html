<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — AzureStay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body class="auth-page">

  <nav class="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">AzureStay</a>
      <div class="nav-actions">
        <a href="/register" class="btn-primary-sm">Register</a>
      </div>
    </div>
  </nav>

  <div class="auth-layout">

    <!-- LEFT PANEL -->
    <div class="auth-panel-left">
      <div class="auth-panel-text">
        <h2>Welcome<br /><em>back.</em></h2>
        <p>Sign in to browse available rooms and manage your reservations.</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="auth-panel-right">
      <div class="auth-card">

        <h1 class="auth-title">Sign in</h1>
        <p class="auth-subtitle">Don't have an account? <a href="/register">Register here</a></p>

        <!-- SUCCESS BANNER -->
        <div class="alert alert--success hidden" id="successAlert">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
          <span id="successMessage"></span>
        </div>

        <!-- ERROR BANNER -->
        <div class="alert alert--error hidden" id="errorAlert">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
          </svg>
          <span id="errorMessage"></span>
        </div>

        <form id="loginForm" novalidate>

          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email"
                   placeholder="maria@example.com" autocomplete="email" />
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input type="password" id="password" name="password"
                     placeholder="Your password" autocomplete="current-password" />
              <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" aria-label="Show password">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </button>
            </div>
            <span class="field-error" id="passwordError"></span>
          </div>

          <button type="submit" class="btn-primary full" id="submitBtn">
            Sign in
          </button>

        </form>

      </div>
    </div>

  </div>

  <script src="/js/login.js"></script>
</body>
</html>
